<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: rgba(15, 15, 18, 0.85);
      --fg: #f8f8fa;
      --accent: #a08cff;
      --hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      user-select: none;
      color: var(--fg);
      display: flex;
      align-items: flex-end;
      height: 100vh;
    }

    .container {
      background: var(--bg);
      backdrop-filter: blur(32px) saturate(200%);
      -webkit-backdrop-filter: blur(32px) saturate(200%);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 260px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .now-playing {
      margin-bottom: 14px;
      min-height: 52px;
    }

    .status-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
      opacity: 0.8;
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
    }

    #track-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    #track-artist {
      font-size: 12px;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.04);
      padding: 8px;
      border-radius: 12px;
    }

    .btn-control {
      background: none;
      border: none;
      color: var(--fg);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-control:hover { background: var(--hover); }
    .btn-control:active { transform: scale(0.92); }

    .btn-control.play {
      background: var(--accent);
      color: #fff;
    }
    .btn-control.play:hover { background: #b0a0ff; }

    .btn-control svg { width: 20px; height: 20px; }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-action {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid transparent;
      color: var(--fg);
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-action:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--border); }
    .btn-action.danger:hover { background: rgba(255, 61, 113, 0.15); color: #ff3d71; border-color: rgba(255, 61, 113, 0.2); }
  </style>
</head>
<body>
  <div class="container" id="main-container">
    <div class="now-playing">
      <span class="status-label" id="status-label">...</span>
      <div id="track-title">Memuat...</div>
      <div id="track-artist">...</div>
    </div>

    <div class="controls">
      <button class="btn-control" onclick="cmd('previous-track')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="play-pause" class="btn-control play" onclick="cmd('toggle-play')">
        <svg id="svg-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="svg-pause" style="display:none" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn-control" onclick="cmd('next-track')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-2.5 6L5 6v12z"/></svg>
      </button>
    </div>

    <div class="actions">
      <button class="btn-action" id="btn-open-label" onclick="window.ipcRenderer.send('tray-menu:open')">Buka</button>
      <button class="btn-action danger" id="btn-exit-label" onclick="window.ipcRenderer.send('tray-menu:exit')">Keluar</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    window.ipcRenderer = ipcRenderer;

    function cmd(name) {
      ipcRenderer.send('tray-menu:command', name);
    }

    ipcRenderer.on('tray:update-state', (event, state) => {
      if (!state) return;
      document.getElementById('track-title').textContent = state.title || 'Tidak Ada Lagu';
      document.getElementById('track-artist').textContent = state.artist || 'Pilih lagu untuk memutar';
      
      // Theme matching
      if (state.accent) document.documentElement.style.setProperty('--accent', state.accent);
      if (state.surface) document.documentElement.style.setProperty('--bg', state.surface);
      if (state.border) document.documentElement.style.setProperty('--border', state.border);

      // Localized labels
      if (state.labels) {
        document.getElementById('btn-open-label').textContent = state.labels.open;
        document.getElementById('btn-exit-label').textContent = state.labels.exit;
        
        const isPlaying = state.isPlaying;
        document.getElementById('status-label').textContent = isPlaying ? state.labels.nowPlaying : state.labels.paused;
        
        document.getElementById('svg-play').style.display = isPlaying ? 'none' : 'block';
        document.getElementById('svg-pause').style.display = isPlaying ? 'block' : 'none';
        
        const label = document.getElementById('status-label');
        label.style.color = isPlaying ? 'var(--accent)' : '#ffaa00';
      }
    });

    // Initial state request
    ipcRenderer.send('tray-menu:get-state');
  </script>
</body>
</html>
